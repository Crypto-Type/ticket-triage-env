name: ticket-triage-env
version: "1.0.0"
description: >
  A real-world customer support ticket triage environment.
  An AI agent reads support tickets and must classify them,
  assign priority, and optionally write a customer reply.

author: Aravind S
license: MIT

tasks:
  - task_id: task1_categorize
    name: Ticket Categorization
    difficulty: easy
    description: Classify the support ticket into billing, technical, or general
    reward_range: [0.0, 1.0]
    action_schema:
      category: "string — one of: billing | technical | general"

  - task_id: task2_prioritize
    name: Ticket Categorization + Priority
    difficulty: medium
    description: Classify the ticket AND assign a priority level
    reward_range: [0.0, 1.0]
    action_schema:
      category: "string — one of: billing | technical | general"
      priority: "string — one of: low | medium | high"

  - task_id: task3_full_triage
    name: Full Ticket Triage
    difficulty: hard
    description: Classify, prioritize, AND write a short customer reply
    reward_range: [0.0, 1.0]
    action_schema:
      category: "string — one of: billing | technical | general"
      priority: "string — one of: low | medium | high"
      reply: "string — a short helpful reply to the customer (min 10 words)"

api:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  tasks: GET  /tasks
  grader:   GET /grader
  baseline: GET /baseline

observation_space:
  ticket_id: string
  subject:   string
  body:      string

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Partial credit based on correctness of category, priority,
    and minimum reply length. Each component contributes equally.